<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Bethel Express & Impex</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/calculator.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin-specific extensions */
        .admin-country-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-header {
            padding: 15px 25px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .country-label-input {
            border: 1px solid transparent;
            background: transparent;
            font-weight: bold;
            font-size: 18px;
            font-family: inherit;
        }

        .country-label-input:focus {
            border-bottom: 1px solid var(--primary-gold);
            outline: none;
        }

        .card-body {
            padding: 25px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .config-item label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .config-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .slab-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .slab-key {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .slab-value {
            width: 100px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .remove-slab-btn {
            background: #fee;
            color: #c33;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 4px;
            cursor: pointer;
        }

        .add-slab-btn {
            background: #f0f0f0;
            border: 1px dashed #ccc;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }

        .save-btn {
            background: var(--primary-dark);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background: #fff;
            color: #c33;
            border: 1px solid #fcc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .admin-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: #fff;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 9999;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .admin-toast.show {
            transform: translateY(0);
        }

        .admin-login-input {
            margin-bottom: 15px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
        }

        .couriers-container {
            margin-top: 25px;
        }

        .courier-section {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .courier-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 15px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-gold);
        }

        .courier-header i {
            color: var(--primary-gold);
        }

        .courier-base-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .courier-base-group .config-item {
            flex: 1;
        }
    </style>
</head>

<body>

    <!-- LOGIN PANEL -->
    <div class="admin-login-overlay" id="adminLoginOverlay">
        <div class="admin-login-card" style="max-width: 400px; width: 90%;">
            <div class="admin-login-logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2>Admin Login</h2>
            <p>Authorized personnel only.</p>
            <div id="adminLoginError" style="color: #ff6b6b; font-size: 13px; margin-bottom: 15px; min-height: 1.2em;">
            </div>
            <div class="admin-login-form-fields">
                <input type="email" class="admin-login-input" id="adminEmail" placeholder="Admin Email" required>
                <input type="password" class="admin-login-input" id="adminPassword" placeholder="Password" required>
                <button type="button" class="admin-login-btn" id="loginSubmitBtn">
                    <i class="fas fa-sign-in-alt"></i> Secure Login
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="admin-dashboard" id="adminDashboard" style="display: none;">
        <div class="admin-topbar">
            <div class="container">
                <div class="admin-topbar-inner">
                    <div class="admin-topbar-brand">
                        <i class="fas fa-cog"></i>
                        <h2>Bethel <span>Admin</span></h2>
                    </div>
                    <div class="admin-topbar-actions">
                        <button class="admin-btn admin-btn-gold" id="addCountryBtn">
                            <i class="fas fa-plus"></i> Add Country
                        </button>
                        <a href="index.html" class="admin-btn admin-btn-outline" style="text-decoration: none;">
                            <i class="fas fa-external-link-alt"></i> Site
                        </a>
                        <button class="admin-btn admin-btn-danger" id="adminLogoutBtn">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-content-header">
                <h3><i class="fas fa-database"></i> Rate Management</h3>
                <p>Updates are applied instantly to the public calculator upon clicking "Save".</p>
            </div>
            <div id="adminCountryList"></div>
        </div>
    </div>

    <div class="admin-toast" id="adminToast"></div>

    <script type="module" src="assets/js/admin.js"></script>
</body>

</html>
